<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>codevOS 2.0</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      background: #0a0c12;
    }
    #wallpaper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: brightness(0.85) contrast(1.05);
      z-index: 0;
      transition: background-image 0.4s ease;
    }
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    #desktop {
      position: relative;
      z-index: 2;
      height: calc(100vh - 52px);
      overflow-y: auto;
      padding: 20px;
    }
    .icon-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 110px;
    }
    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(30, 30, 45, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 15px;
      padding: 10px 5px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.2);
      color: #f0f0f0;
      text-shadow: 0 1px 2px black;
    }
    .icon:hover {
      background: rgba(70, 70, 100, 0.8);
      transform: scale(1.02);
      border-color: rgba(255,215,0,0.6);
    }
    .icon i {
      font-size: 35px;
      margin-bottom: 5px;
    }
    .ic-label {
      font-size: 15px;
      font-weight: 500;
    }
    .window {
      position: absolute;
      top: 15%;
      left: 20%;
      width: 560px;
      min-width: 380px;
      background: rgba(20, 22, 27, 0.92);
      backdrop-filter: blur(24px);
      border-radius: 18px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
      display: none;
      flex-direction: column;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .win-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.5);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      padding: 10px 15px;
      cursor: grab;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .win-titlebar:active { cursor: grabbing; }
    .win-title {
      font-size: 15px;
      font-weight: 500;
      color: #eef2ff;
    }
    .win-controls { display: flex; gap: 8px; }
    .wbtn {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      border: none;
      font-size: 15px;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(80,80,100,1);
      color: white;
    }
    .wbtn.close { background: #e34f4f; }
    .wbtn.close:hover { background: #ff6363; }
    .wbtn.min { background: #f0b37b; }
    .wbtn.max { background: #5f9e6e; }
    .win-body {
      padding: 20px;
      min-height: 280px;
      color: #eef2ff;
      overflow-y: auto;
      max-height: 65vh;
    }
    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: rgba(10, 15, 25, 1);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 200;
    }
    .tb-left { display: flex; gap: 12px; }
    .tb-btn {
      background: rgba(40,45,65,1);
      padding: 5px 15px;
      border-radius: 15px;
      font-size: 20px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
    }
    .tb-btn:hover { background: rgba(80,90,130,0.9); transform: translateY(-2px); }
    .tb-right {
      display: flex;
      gap: 20px;
      font-weight: 500;
      background: rgba(0,0,0,0.3);
      padding: 5px 15px;
      border-radius: 48px;
      color: #ffffffd9;
    }
    .tb-time, .tb-date { font-size: 14px; }
    #login {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 10%, #0b2242, #85a0d6);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .login-box {
      background: rgba(20, 25, 40, 1);
      backdrop-filter: blur(16px);
      padding: 2rem;
      border-radius: 45px;
      width: 340px;
      text-align: center;
      border: 1px solid rgba(223, 197, 138, 0.3);
      box-shadow: 0 25px 40px rgb(50, 143, 168);
    }
    .login-avatar { font-size: 68px; margin-bottom: 12px; }
    .login-logo {
      font-size: 35px;
      font-weight: 800;
      background: linear-gradient(135deg, #ccdeff, #a0b5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-logo span { color: #f7c56e; background: none; }
    .login-sub { color: #bac8ff; margin: 10px 0 22px; font-size: 14px; }
    .login-input {
      width: 100%;
      padding: 10px 15px;
      margin: 8px 0;
      background: #1e2438;
      border: 1px solid #38445e;
      border-radius: 60px;
      color: white;
      font-size: 15px;
      outline: none;
    }
    .login-btn {
      background: #ffb347;
      width: 100%;
      padding: 12px;
      margin: 18px 0 10px;
      border: none;
      border-radius: 60px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .error-msg { color: #ff9a8b; font-size: 12px; margin: 6px; display: none; }
    .login-hint { font-size: 11px; color: #8d9bc0; margin-top: 8px; }
    .calc-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .calc-btn {
      background: #2b2f44;
      padding: 15px;
      text-align: center;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .calc-display {
      background: #0b0e16;
      padding: 20px 15px;
      border-radius: 35px;
      text-align: right;
      font-size: 35px;
      font-family: monospace;
      margin-bottom: 20px;
    }
    .file-item {
      background: #2a2e42;
      margin: 6px 0;
      padding: 10px;
      border-radius: 28px;
      cursor: pointer;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .cal-month { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
    .cal-day { padding: 8px 0; background: #1f253e; border-radius: 28px; }
    .setting-option { background: #1e243b; padding: 10px; border-radius: 25px; margin: 10px 0; }
    .browser-bar { display: flex; gap: 10px; margin-bottom: 15px; }
    .browser-url {
      flex:1;
      background: #0f121f;
      border: none;
      padding: 10px 15px;
      border-radius: 60px;
      color: white;
    }
    iframe { width: 100%; height: 380px; border-radius: 20px; background: white; }
    button { background: #ffbc6e; border: none; padding: 5px 15px; border-radius: 60px; cursor: pointer; font-weight: bold; }
    hr { border-color: rgba(255,255,255,0.2); margin: 10px 0; }
  </style>
</head>
<body>

<div id="wallpaper" style="background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80')"></div>
<canvas id="particles"></canvas>

<div id="desktop">
  <div class="icon-grid">
    <div class="icon" onclick="openCalc()"><i class="fas fa-calculator"></i><span class="ic-label">Calculator</span></div>
    <div class="icon" onclick="openCalendarApp()"><i class="fas fa-calendar-alt"></i><span class="ic-label">Calendar</span></div>
    <div class="icon" onclick="openClockApp()"><i class="fas fa-clock"></i><span class="ic-label">Clock</span></div>
    <div class="icon" onclick="openBrowserApp()"><i class="fas fa-globe"></i><span class="ic-label">Browser</span></div>
    <div class="icon" onclick="openFilesApp()"><i class="fas fa-folder"></i><span class="ic-label">Files</span></div>
    <div class="icon" onclick="openSettingsApp()"><i class="fas fa-cog"></i><span class="ic-label">Settings</span></div>
    <div class="icon" onclick="openWelcomeApp()"><i class="fas fa-home"></i><span class="ic-label">Home</span></div>
  </div>
</div>

<div class="window" id="win">
  <div class="win-titlebar" id="winTitleBar">
    <div class="win-controls">
      <button class="wbtn close" id="btnClose">✕</button>
      <button class="wbtn min" id="btnMin">─</button>
      <button class="wbtn max" id="btnMax">□</button>
    </div>
    <span class="win-title" id="winTitleText">codevOS Window</span>
    <div style="width:52px"></div>
  </div>
  <div class="win-body" id="winBody"></div>
</div>

<div id="taskbar">
  <div class="tb-left">
    <div class="tb-btn" onclick="openWelcomeApp()"><i class="fas fa-th-large"></i></div>
    <div class="tb-btn" onclick="openFilesApp()"><i class="fas fa-folder"></i></div>
    <div class="tb-btn" onclick="openBrowserApp()"><i class="fas fa-globe"></i></div>
    <div class="tb-btn" onclick="openSettingsApp()"><i class="fas fa-cog"></i></div>
  </div>
  <div class="tb-right">
    <div class="tb-time" id="tbTime">--:--:--</div>
    <div class="tb-date" id="tbDate">---</div>
  </div>
</div>

<div id="login">
  <div class="login-box">
    <div class="login-logo">Codev<span>OS</span></div>
    <div class="login-sub">enter credentials to continue</div>
    <input class="login-input" id="loginUser" placeholder="Username" autocomplete="off">
    <input class="login-input" id="loginPass" type="password" placeholder="Password">
    <div class="error-msg" id="loginErr">❌ Nope, wrong combo</div>
    <button class="login-btn" onclick="doLoginPlease()">Sign in →</button>
    <div class="login-hint">🔐 admin / codev123</div>
  </div>
</div>

<script>
  const win = document.getElementById('win');
  const winTitleBar = document.getElementById('winTitleBar');
  const winTitleSpan = document.getElementById('winTitleText');
  const winBody = document.getElementById('winBody');
  let winState = {
    isMaximized: false,
    x: 120,
    y: 70,
    width: 560,
    height: 'auto',
    restore: { x: 120, y: 70, width: 560 }
  };
  function applyWinPos() {
    if(winState.isMaximized) {
      win.style.left = '0px';
      win.style.top = '0px';
      win.style.width = '100%';
      win.style.height = `calc(100vh - 52px)`;
      win.style.borderRadius = '0px';
    } else {
      win.style.left = winState.x + 'px';
      win.style.top = winState.y + 'px';
      win.style.width = winState.width + 'px';
      win.style.height = 'auto';
      win.style.maxHeight = '80vh';
      win.style.borderRadius = '18px';
    }
  }
  function showWindow(title, contentHtml) {
    winTitleSpan.innerText = title;
    winBody.innerHTML = contentHtml;
    win.style.display = 'flex';
    win.style.zIndex = 200 + Math.floor(Date.now() % 100);
    if(winState.isMaximized) applyWinPos();
    else {
      win.style.left = winState.x + 'px';
      win.style.top = winState.y + 'px';
      win.style.width = winState.width + 'px';
    }
  }
  const WM = {
    close: () => { win.style.display = 'none'; },
    minimize: () => { win.style.display = 'none'; },
    maximize: () => {
      if(!winState.isMaximized) {
        winState.restore = { x: winState.x, y: winState.y, width: winState.width };
        winState.isMaximized = true;
        applyWinPos();
      } else {
        winState.isMaximized = false;
        winState.x = winState.restore.x;
        winState.y = winState.restore.y;
        winState.width = winState.restore.width;
        applyWinPos();
      }
    }
  };
  document.getElementById('btnClose').onclick = () => WM.close();
  document.getElementById('btnMin').onclick = () => WM.minimize();
  document.getElementById('btnMax').onclick = () => WM.maximize();
  let dragActive = false, dragStartX = 0, dragStartY = 0, initialLeft = 0, initialTop = 0;
  winTitleBar.addEventListener('mousedown', (e) => {
    if(winState.isMaximized) return;
    if(e.target.closest('.win-controls')) return;
    dragActive = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    initialLeft = winState.x;
    initialTop = winState.y;
    winTitleBar.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if(!dragActive || winState.isMaximized) return;
    let dx = e.clientX - dragStartX;
    let dy = e.clientY - dragStartY;
    let newLeft = initialLeft + dx;
    let newTop = initialTop + dy;
    newLeft = Math.min(window.innerWidth - 100, Math.max(10, newLeft));
    newTop = Math.min(window.innerHeight - 120, Math.max(10, newTop));
    winState.x = newLeft;
    winState.y = newTop;
    win.style.left = newLeft + 'px';
    win.style.top = newTop + 'px';
  });
  window.addEventListener('mouseup', () => {
    dragActive = false;
    winTitleBar.style.cursor = 'grab';
  });
  winTitleBar.style.cursor = 'grab';
  function openCalc() {
    showWindow('Calculator', `
      <div class="calc-display" id="calcDisplay">0</div>
      <div class="calc-buttons" id="calcButtons">
        ${['7','8','9','/','4','5','6','*','1','2','3','-','0','C','=','+'].map(btn => `<div class="calc-btn" data-val="${btn}">${btn}</div>`).join('')}
      </div>
    `);
    let expr = '0';
    const displayDiv = document.getElementById('calcDisplay');
    const update = () => { displayDiv.innerText = expr.length > 18 ? expr.slice(0,18)+'..' : expr || '0'; };
    document.querySelectorAll('.calc-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        let val = btn.getAttribute('data-val');
        if(val === 'C') { expr = '0'; update(); return; }
        if(val === '=') {
          try {
            let res = eval(expr.replace(/×/g,'*').replace(/÷/g,'/'));
            expr = String(res);
          } catch(e) { expr = 'Error'; }
          update();
          return;
        }
        if(expr === '0' && !isNaN(val) && val !== '.') expr = val;
        else expr += val;
        update();
      });
    });
    update();
  }
  function openCalendarApp() {
    let currentDate = new Date();
    function renderCalendar(date) {
      const year = date.getFullYear(), month = date.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      let grid = '';
      for(let i=0;i<firstDay;i++) grid += '<div></div>';
      for(let d=1; d<=daysInMonth; d++) {
        let isToday = (d === new Date().getDate() && year === new Date().getFullYear() && month === new Date().getMonth());
        grid += `<div class="cal-day" style="${isToday ? 'background:#f0a34b; color:#111' : ''}">${d}</div>`;
      }
      return grid;
    }
    function refreshCal() {
      let year = currentDate.getFullYear(), month = currentDate.getMonth();
      let monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      let html = `<div class="cal-month"><button id="prevMonth">◀ Prev</button><h3>${monthNames[month]} ${year}</h3><button id="nextMonth">Next ▶</button></div><div class="cal-grid">${renderCalendar(currentDate)}</div>`;
      showWindow('Calendar', html);
      document.getElementById('prevMonth')?.addEventListener('click',()=>{ currentDate.setMonth(currentDate.getMonth()-1); refreshCal(); });
      document.getElementById('nextMonth')?.addEventListener('click',()=>{ currentDate.setMonth(currentDate.getMonth()+1); refreshCal(); });
    }
    refreshCal();
  }
  let clockInterval = null;
  function openClockApp() {
    function updateClockHTML(){
      let now = new Date();
      let timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      let dateStr = now.toLocaleDateString(undefined, {weekday:'long', year:'numeric', month:'long', day:'numeric'});
      showWindow('Digital Clock', `<div style="text-align:center; padding:20px;"><div style="font-size:56px; font-family:monospace; letter-spacing:4px;">${timeStr}</div><div style="margin-top:24px; font-size:18px;">${dateStr}</div><hr><div style="font-size:14px; opacity:0.8;">⌛ codevOS Timekeeper</div></div>`);
    }
    if(clockInterval) clearInterval(clockInterval);
    updateClockHTML();
    clockInterval = setInterval(() => { if(win.style.display === 'flex' && winTitleSpan.innerText === 'Digital Clock') updateClockHTML(); }, 1000);
  }
  function openBrowserApp() {
    showWindow('Web Browser', `<div class="browser-bar"><input type="text" id="urlInput" class="browser-url" placeholder="https://example.com" value="https://www.wikipedia.org"><button id="goBtn">🌍 Go</button></div><iframe id="browserFrame" src="https://www.wikipedia.org" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-same-origin"></iframe><div style="font-size:11px; margin-top:8px;">⚠️ Some sites block iframes - not my fault</div>`);
    const goBtn = document.getElementById('goBtn');
    const urlInput = document.getElementById('urlInput');
    const frame = document.getElementById('browserFrame');
    const loadUrl = () => { let url = urlInput.value; if(!url.startsWith('http')) url = 'https://'+url; frame.src = url; };
    goBtn?.addEventListener('click', loadUrl);
    urlInput?.addEventListener('keypress', (e) => { if(e.key === 'Enter') loadUrl(); });
  }
  const fakeFS = {
    'Documents': { type:'dir', children: { 'readme.txt': 'Welcome to codevOS! This is your personal space.', 'todo.txt': 'Finish project, review calendar' } },
    'Pictures': { type:'dir', children: { 'wallpaper.jpg': '[image preview not available] but you can change bg in settings.', 'screenshot.png': 'codev desktop cool!' } },
    'System': { type:'dir', children: { 'version.info': 'codevOS 2.0 (build 2405)', 'kernel.cfg': 'secure mode enabled' } }
  };
  function openFilesApp() {
    function renderDir(path) {
      let cur = fakeFS;
      if(path) {
        let parts = path.split('/');
        for(let p of parts) if(p && cur.children && cur.children[p]) cur = cur.children[p];
      }
      let items = cur.children ? Object.keys(cur.children) : [];
      let html = `<div style="margin-bottom:12px;"><button id="filesUpBtn">⬆️ Up</button> <span style="margin-left:10px;">📁 ${path || 'Root'}</span></div><div id="fileList">`;
      for(let item of items) {
        let isDir = cur.children[item]?.type === 'dir';
        html += `<div class="file-item" data-name="${item}" data-is-dir="${isDir}">${isDir ? '📁 ' : '📄 '} ${item}</div>`;
      }
      html += `</div><div id="filePreview" style="margin-top:18px; background:#00000044; padding:12px; border-radius:20px;"><i>Click a file to preview</i></div>`;
      showWindow('File Explorer', html);
      document.querySelectorAll('.file-item').forEach(el => {
        el.addEventListener('click', () => {
          let name = el.getAttribute('data-name');
          let isDir = el.getAttribute('data-is-dir') === 'true';
          if(isDir) {
            let newPath = path ? path+'/'+name : name;
            renderDir(newPath);
          } else {
            let content = 'cant read this file sorry';
            if(path === 'Documents' && name === 'readme.txt') content = fakeFS.Documents.children.readme.txt;
            if(path === 'Documents' && name === 'todo.txt') content = fakeFS.Documents.children['todo.txt'];
            if(path === 'Pictures' && name === 'wallpaper.jpg') content = fakeFS.Pictures.children['wallpaper.jpg'];
            if(path === 'System' && name === 'version.info') content = fakeFS.System.children['version.info'];
            document.getElementById('filePreview').innerHTML = `<strong>📄 ${name}</strong><br><pre style="white-space:pre-wrap;">${content}</pre>`;
          }
        });
      });
      document.getElementById('filesUpBtn')?.addEventListener('click', () => {
        if(path && path.includes('/')) {
          let newPath = path.substring(0, path.lastIndexOf('/'));
          renderDir(newPath);
        } else if(path) renderDir('');
        else renderDir('');
      });
    }
    renderDir('');
  }
  function openSettingsApp() {
    const walls = [
      'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80',
      'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80',
      'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=1920&q=80'
    ];
    showWindow('Settings', `
      <div class="setting-option"><label>🎨 Desktop Wallpaper</label><div style="display:flex; gap:12px; margin-top:10px;"><button id="wall1">Mountain</button><button id="wall2">Forest</button><button id="wall3">Lake</button></div></div>
      <div class="setting-option"><label>🌟 Theme: codev Dark (default)</label><div>System appearance only</div></div>
      <div class="setting-option"><label>🧩 About codevOS</label><div>Version 2.0 "Luminary"<br>Made for immersive desktop experience<br>✨ Human-crafted ✨</div></div>
    `);
    document.getElementById('wall1')?.addEventListener('click',()=>{ document.getElementById('wallpaper').style.backgroundImage = `url('${walls[0]}')`; localStorage.setItem('codevWall',walls[0]); });
    document.getElementById('wall2')?.addEventListener('click',()=>{ document.getElementById('wallpaper').style.backgroundImage = `url('${walls[1]}')`; localStorage.setItem('codevWall',walls[1]); });
    document.getElementById('wall3')?.addEventListener('click',()=>{ document.getElementById('wallpaper').style.backgroundImage = `url('${walls[2]}')`; localStorage.setItem('codevWall',walls[2]); });
  }
  function openWelcomeApp() {
    showWindow('Welcome Home', `
      <div style="text-align:center"><span style="font-size:54px;">🏠</span>
      <h2>codevOS 2.0</h2>
      <p>Your futuristic desktop environment is ready.</p>
      <hr>
      <div style="background:#00000033; border-radius: 30px; padding:12px;"><b>📌 Tips:</b><br>• Drag windows by titlebar<br>• Use Settings to change wallpaper<br>• Explore Files (Documents, Pictures)<br>• Built-in browser works with iframe</div>
      <p style="margin-top:14px;">✨ Made with care, no AI template vibes ✨</p>
      </div>
    `);
  }
  window.openCalc = openCalc;
  window.openCalendarApp = openCalendarApp;
  window.openClockApp = openClockApp;
  window.openBrowserApp = openBrowserApp;
  window.openFilesApp = openFilesApp;
  window.openSettingsApp = openSettingsApp;
  window.openWelcomeApp = openWelcomeApp;
  function refreshTaskbarTime() {
    let d = new Date();
    let time = d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    let dateStr = d.toLocaleDateString([], { month:'short', day:'numeric' });
    document.getElementById('tbTime').innerText = time;
    document.getElementById('tbDate').innerText = dateStr;
  }
  setInterval(refreshTaskbarTime, 500);
  refreshTaskbarTime();
  function doLoginPlease() {
    let user = document.getElementById('loginUser').value.trim();
    let pass = document.getElementById('loginPass').value;
    if(user === 'admin' && pass === 'codev123') {
      document.getElementById('login').style.display = 'none';
      let savedWall = localStorage.getItem('codevWall');
      if(savedWall) document.getElementById('wallpaper').style.backgroundImage = `url('${savedWall}')`;
      console.log("login success");
    } else {
      document.getElementById('loginErr').style.display = 'block';
      setTimeout(()=> { document.getElementById('loginErr').style.display = 'none'; }, 2000);
    }
  }
  window.doLoginPlease = doLoginPlease;
  document.getElementById('loginUser')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doLoginPlease(); });
  document.getElementById('loginPass')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doLoginPlease(); });
  const canvas = document.getElementById('particles');
  const ctxP = canvas.getContext('2d');
  let particlesList = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  for(let i=0;i<90;i++) {
    particlesList.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, radius:Math.random()*2.2+0.8, alpha:Math.random()*0.5+0.2, vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.1 });
  }
  function drawParticlesLoop() {
    if(!ctxP) return;
    ctxP.clearRect(0,0,canvas.width,canvas.height);
    for(let p of particlesList) {
      ctxP.beginPath();
      ctxP.arc(p.x, p.y, p.radius, 0, Math.PI*2);
      ctxP.fillStyle = `rgba(255, 245, 210, ${p.alpha})`;
      ctxP.fill();
      p.x += p.vx;
      p.y += p.vy;
      if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
      if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
    }
    requestAnimationFrame(drawParticlesLoop);
  }
  drawParticlesLoop();
  winState.x = window.innerWidth/2 - 280;
  winState.y = 90;
  winState.width = 560;
  win.style.left = winState.x + 'px';
  win.style.top = winState.y + 'px';
</script>
